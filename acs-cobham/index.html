<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACS Cobham — Bilimevi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f6ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .bv-header {
      background: #1a3c6e;
      padding: 32px 20px 24px;
      text-align: center;
    }

    .bv-header img {
      height: 40px;
      display: block;
      margin: 0 auto 14px;
      filter: brightness(0) invert(1);
    }

    .bv-school-name {
      color: rgba(255,255,255,0.92);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .bv-form-card {
      margin: 20px 16px;
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid #d0dff5;
      padding: 24px 18px;
      flex: 1;
    }

    .bv-form-card p {
      font-size: 13px;
      color: #6b82a0;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .bv-footer {
      text-align: center;
      padding: 12px 0 24px;
    }

    .bv-footer a {
      font-size: 12px;
      color: #5a7aaa;
      text-decoration: none;
    }

    @media (min-width: 480px) {
      body { align-items: center; }
      .bv-header { width: 100%; }
      .bv-form-card { max-width: 420px; width: calc(100% - 32px); }
    }
  </style>
</head>
<body>

  <div class="bv-header">
    <img src="https://www.bilimevi.com/assets/images/bilimevi_logo_761.svg" alt="Bilimevi">
    <div class="bv-school-name">ACS Cobham</div>
  </div>

  <div class="bv-form-card">
    <div id="kl__form-container"></div>
    <script src="https://assets.kylas.io/lead-capture-forms/lcf.min.js" form-id="afce4010-d43f-467e-ad57-8dcf5141cb23"></script>
  </div>

  <div class="bv-footer">
    <a href="https://www.bilimevi.com">bilimevi.com</a>
  </div>

</body>
</html>
